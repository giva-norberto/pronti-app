<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor da Home - Pronti</title>

  <style>
    :root {
      --azul: #2563eb;
      --roxo: #7c3aed;
      --fundo: #f4f7fb;
      --texto: #172033;
      --cinza: #6b7280;
      --branco: #ffffff;
      --borda: #e5e7eb;
      --verde: #16a34a;
      --vermelho: #dc2626;
      --sombra: 0 14px 35px rgba(15, 23, 42, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #eef2ff, #f5f3ff);
      color: var(--texto);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topo {
      background: linear-gradient(135deg, var(--azul), var(--roxo));
      color: white;
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--sombra);
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .topo p {
      opacity: 0.95;
      font-size: 15px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 22px;
    }

    .card {
      background: var(--branco);
      border-radius: var(--radius);
      box-shadow: var(--sombra);
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.6);
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 7px;
      color: #1f2937;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--borda);
      margin-bottom: 15px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--azul), var(--roxo));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(37,99,235,0.25);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--vermelho);
      margin-top: 10px;
    }

    .btn-small {
      width: auto;
      padding: 9px 12px;
      font-size: 13px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--cinza);
      line-height: 1.4;
    }

    .lista {
      display: grid;
      gap: 16px;
    }

    .item {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--borda);
      border-radius: 18px;
      background: #ffffff;
    }

    .preview {
      width: 100%;
      height: 110px;
      border-radius: 14px;
      object-fit: cover;
      background: #e5e7eb;
    }

    .info h3 {
      font-size: 17px;
      margin-bottom: 5px;
    }

    .info p {
      font-size: 14px;
      color: var(--cinza);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
      background: #eef2ff;
      color: #4338ca;
    }

    .badge.off {
      background: #fee2e2;
      color: #b91c1c;
    }

    .acoes {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .vazio {
      text-align: center;
      color: var(--cinza);
      padding: 30px;
      border: 1px dashed var(--borda);
      border-radius: 18px;
      background: #fafafa;
    }

    @media (max-width: 850px) {
      body {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 1fr;
      }

      .preview {
        height: 190px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topo">
      <h1>Editor da Home do Pronti</h1>
      <p>
        Cadastre fotos, vídeos, prints, banners e conteúdos para aparecerem no site público do Pronti sem mexer no código.
      </p>
    </div>

    <div class="grid">
      <div class="card">
        <h2 style="margin-bottom: 18px;">Novo conteúdo</h2>

        <label for="tipo">Tipo de conteúdo</label>
        <select id="tipo">
          <option value="imagem">Imagem / Print</option>
          <option value="video">Vídeo</option>
          <option value="banner">Banner</option>
          <option value="depoimento">Depoimento</option>
        </select>

        <label for="titulo">Título</label>
        <input id="titulo" type="text" placeholder="Ex: Agenda inteligente do Pronti" />

        <label for="descricao">Descrição</label>
        <textarea id="descricao" placeholder="Explique rapidamente o que aparece nessa imagem ou vídeo"></textarea>

        <label for="categoria">Categoria</label>
        <select id="categoria">
          <option value="home">Home</option>
          <option value="agenda">Agenda</option>
          <option value="dashboard">Dashboard</option>
          <option value="vitrine">Vitrine</option>
          <option value="fila">Fila inteligente</option>
          <option value="notificacoes">Notificações</option>
          <option value="manual">Manual</option>
          <option value="depoimentos">Depoimentos</option>
        </select>

        <label for="ordem">Ordem de exibição</label>
        <input id="ordem" type="number" value="1" min="1" />

        <label for="arquivo">Arquivo</label>
        <input id="arquivo" type="file" accept="image/*,video/*" />

        <button class="btn btn-primary" id="btnSalvar">
          Salvar conteúdo
        </button>

        <div class="status" id="status">
          Aguardando envio.
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 18px;">Conteúdos cadastrados</h2>
        <div id="listaConteudos" class="lista">
          <div class="vazio">Carregando conteúdos...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, storage, auth } from "./firebase-config.js";

    import {
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      updateDoc,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    import {
      ref,
      uploadBytes,
      getDownloadURL,
      deleteObject
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const ADMIN_UID = "BX6Q7HrVMrcCBqe72r7K76EBPkX2";

    const tipo = document.getElementById("tipo");
    const titulo = document.getElementById("titulo");
    const descricao = document.getElementById("descricao");
    const categoria = document.getElementById("categoria");
    const ordem = document.getElementById("ordem");
    const arquivo = document.getElementById("arquivo");
    const btnSalvar = document.getElementById("btnSalvar");
    const statusEl = document.getElementById("status");
    const listaConteudos = document.getElementById("listaConteudos");

    let usuarioAtual = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        statusEl.innerHTML = "Você precisa estar logado para editar a Home.";
        btnSalvar.disabled = true;
        return;
      }

      usuarioAtual = user;

      if (user.uid !== ADMIN_UID) {
        statusEl.innerHTML = "Seu usuário não tem permissão para editar a Home.";
        btnSalvar.disabled = true;
        return;
      }

      statusEl.innerHTML = "Editor liberado para o administrador.";
      btnSalvar.disabled = false;
      carregarConteudos();
    });

    btnSalvar.addEventListener("click", salvarConteudo);

    async function salvarConteudo() {
      try {
        if (!usuarioAtual || usuarioAtual.uid !== ADMIN_UID) {
          alert("Acesso não autorizado.");
          return;
        }

        const arquivoSelecionado = arquivo.files[0];

        if (!titulo.value.trim()) {
          alert("Informe o título.");
          return;
        }

        if (!arquivoSelecionado) {
          alert("Selecione uma foto ou vídeo.");
          return;
        }

        btnSalvar.disabled = true;
        statusEl.innerHTML = "Enviando arquivo...";

        const extensao = arquivoSelecionado.name.split(".").pop();
        const nomeSeguro = `${Date.now()}-${Math.random().toString(36).substring(2)}.${extensao}`;
        const caminhoStorage = `site_home_midias/${tipo.value}/${nomeSeguro}`;

        const arquivoRef = ref(storage, caminhoStorage);

        await uploadBytes(arquivoRef, arquivoSelecionado);

        const url = await getDownloadURL(arquivoRef);

        statusEl.innerHTML = "Salvando informações...";

        await addDoc(collection(db, "site_home_midias"), {
          tipo: tipo.value,
          titulo: titulo.value.trim(),
          descricao: descricao.value.trim(),
          categoria: categoria.value,
          ordem: Number(ordem.value || 1),
          url: url,
          caminhoStorage: caminhoStorage,
          ativo: true,
          criadoEm: serverTimestamp(),
          criadoPor: usuarioAtual.uid
        });

        limparFormulario();

        statusEl.innerHTML = "Conteúdo salvo com sucesso.";
        await carregarConteudos();

      } catch (error) {
        console.error("Erro ao salvar conteúdo:", error);
        statusEl.innerHTML = "Erro ao salvar conteúdo. Veja o console.";
        alert("Erro ao salvar conteúdo.");
      } finally {
        btnSalvar.disabled = false;
      }
    }

    async function carregarConteudos() {
      try {
        listaConteudos.innerHTML = `<div class="vazio">Carregando conteúdos...</div>`;

        const q = query(
          collection(db, "site_home_midias"),
          orderBy("ordem", "asc")
        );

        const snap = await getDocs(q);

        if (snap.empty) {
          listaConteudos.innerHTML = `<div class="vazio">Nenhum conteúdo cadastrado ainda.</div>`;
          return;
        }

        listaConteudos.innerHTML = "";

        snap.forEach((docSnap) => {
          const item = docSnap.data();
          const id = docSnap.id;

          const div = document.createElement("div");
          div.className = "item";

          let midiaHtml = "";

          if (item.tipo === "video") {
            midiaHtml = `
              <video class="preview" controls>
                <source src="${item.url}">
              </video>
            `;
          } else {
            midiaHtml = `
              <img class="preview" src="${item.url}" alt="${item.titulo || "Imagem do Pronti"}">
            `;
          }

          div.innerHTML = `
            <div>
              ${midiaHtml}
            </div>

            <div class="info">
              <h3>${item.titulo || "Sem título"}</h3>
              <p>${item.descricao || "Sem descrição."}</p>

              <span class="badge">${item.tipo || "conteúdo"}</span>
              <span class="badge">${item.categoria || "home"}</span>
              <span class="badge">Ordem ${item.ordem || 1}</span>
              <span class="badge ${item.ativo ? "" : "off"}">
                ${item.ativo ? "Ativo" : "Oculto"}
              </span>

              <div class="acoes">
                <button class="btn btn-small btn-primary" onclick="alternarAtivo('${id}', ${item.ativo ? "false" : "true"})">
                  ${item.ativo ? "Ocultar" : "Ativar"}
                </button>

                <button class="btn btn-small btn-danger" onclick="excluirConteudo('${id}', '${item.caminhoStorage || ""}')">
                  Excluir
                </button>
              </div>
            </div>
          `;

          listaConteudos.appendChild(div);
        });

      } catch (error) {
        console.error("Erro ao carregar conteúdos:", error);
        listaConteudos.innerHTML = `<div class="vazio">Erro ao carregar conteúdos.</div>`;
      }
    }

    window.alternarAtivo = async function(id, novoStatus) {
      try {
        await updateDoc(doc(db, "site_home_midias", id), {
          ativo: novoStatus
        });

        await carregarConteudos();

      } catch (error) {
        console.error("Erro ao alterar status:", error);
        alert("Erro ao alterar status.");
      }
    };

    window.excluirConteudo = async function(id, caminhoStorage) {
      try {
        const confirmar = confirm("Tem certeza que deseja excluir este conteúdo?");
        if (!confirmar) return;

        await deleteDoc(doc(db, "site_home_midias", id));

        if (caminhoStorage) {
          try {
            const arquivoRef = ref(storage, caminhoStorage);
            await deleteObject(arquivoRef);
          } catch (erroStorage) {
            console.warn("Arquivo não removido do Storage:", erroStorage);
          }
        }

        await carregarConteudos();

      } catch (error) {
        console.error("Erro ao excluir conteúdo:", error);
        alert("Erro ao excluir conteúdo.");
      }
    };

    function limparFormulario() {
      titulo.value = "";
      descricao.value = "";
      ordem.value = "1";
      arquivo.value = "";
      tipo.value = "imagem";
      categoria.value = "home";
    }
  </script>
</body>
</html>
