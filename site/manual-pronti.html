<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual do Cliente - Pronti</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --white: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    .app { display: flex; min-height: 100vh; }

    /* Sidebar do Manual */
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid var(--border);
      padding: 24px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      color: var(--primary);
      font-weight: 800;
      font-size: 20px;
      text-decoration: none;
    }

    .menu-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-weight: 700;
    }

    .nav-menu { display: grid; gap: 8px; }

    .nav-item {
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .nav-item:hover { background: #f1f5f9; }
    .nav-item.active {
      background: var(--primary);
      color: white;
    }

    /* Conteúdo Principal */
    .content {
      margin-left: 280px;
      flex: 1;
      padding: 40px;
      max-width: 1000px;
    }

    .manual-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      background: #eff6ff;
      color: var(--primary);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
    
    .text-content {
      font-size: 16px;
      color: #334155;
      white-space: pre-wrap; /* Mantém as quebras de linha do editor */
      margin-bottom: 32px;
    }

    .image-container {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: none;
    }

    .image-container img {
      width: 100%;
      display: block;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--text-muted);
      font-weight: 600;
    }

    @media (max-width: 850px) {
      .app { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .content { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-circle-chevron-left"></i> Voltar
      </a>
      
      <div class="menu-title">Tópicos de Ajuda</div>
      <nav class="nav-menu">
        <button class="nav-item active" data-section="inicio"><i class="fa-solid fa-house"></i> Início</button>
        <button class="nav-item" data-section="login"><i class="fa-solid fa-lock"></i> Login</button>
        <button class="nav-item" data-section="empresa"><i class="fa-solid fa-building"></i> Criar empresa</button>
        <button class="nav-item" data-section="servicos"><i class="fa-solid fa-scissors"></i> Serviços</button>
        <button class="nav-item" data-section="novo-servico"><i class="fa-solid fa-plus"></i> Novo serviço</button>
        <button class="nav-item" data-section="profissionais"><i class="fa-solid fa-users"></i> Profissionais</button>
        <button class="nav-item" data-section="agenda"><i class="fa-solid fa-calendar"></i> Agenda</button>
        <button class="nav-item" data-section="promocoes"><i class="fa-solid fa-tag"></i> Promoções</button>
        <button class="nav-item" data-section="clientes-retorno"><i class="fa-solid fa-heart"></i> Retorno</button>
        <button class="nav-item" data-section="vitrine"><i class="fa-solid fa-globe"></i> Vitrine</button>
        <button class="nav-item" data-section="pagamentos"><i class="fa-solid fa-credit-card"></i> Pagamentos</button>
      </nav>
    </aside>

    <main class="content">
      <div id="manual-view" class="manual-card">
        <div class="loading">Carregando informações...</div>
      </div>
    </main>
  </div>

  <script type="module">
    import { db } from "../firebase-config.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const COLECAO_MANUAL = "manual_global";
    const viewContainer = document.getElementById("manual-view");

    async function carregarConteudo(secaoId) {
      viewContainer.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Buscando no manual...</div>';
      
      try {
        const docRef = doc(db, COLECAO_MANUAL, secaoId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const dados = docSnap.data();
          
          let html = `
            <span class="badge">${dados.nome || 'Manual'}</span>
            <h1>${dados.titulo || 'Sem título'}</h1>
            <div class="text-content">${dados.conteudo || 'Esta seção ainda não possui conteúdo explicativo.'}</div>
          `;

          if (dados.imagem) {
            html += `
              <div class="image-container" style="display: block;">
                <img src="${dados.imagem}" alt="Instrução visual">
              </div>
            `;
          }

          viewContainer.innerHTML = html;
        } else {
          viewContainer.innerHTML = `
            <div class="loading">
              <i class="fa-solid fa-circle-info"></i><br>
              Esta seção ainda não foi configurada no editor.
            </div>
          `;
        }
      } catch (error) {
        console.error("Erro ao carregar:", error);
        viewContainer.innerHTML = '<div class="loading">Erro ao carregar dados do Firebase.</div>';
      }
    }

    // Gerenciar cliques no menu
    document.querySelectorAll(".nav-item").forEach(botao => {
      botao.addEventListener("click", () => {
        document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
        botao.classList.add("active");
        carregarConteudo(botao.dataset.section);
      });
    });

    // Carregar seção inicial
    carregarConteudo("inicio");
  </script>

</body>
</html>
