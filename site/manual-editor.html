<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor do Manual - Pronti (Versão Completa)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #6366f1;
      --bg: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --white: #ffffff;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: none; /* Oculto até validar acesso */
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1e40af, #2563eb, #4f46e5);
      color: white;
      padding: 24px 18px;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      padding: 0 8px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: white;
      color: var(--primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
    }

    .logo-text strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .logo-text span {
      font-size: 12px;
      opacity: 0.8;
    }

    .menu-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.75;
      margin: 20px 8px 10px;
      font-weight: 700;
    }

    .menu {
      display: grid;
      gap: 8px;
    }

    .menu button {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      padding: 13px 14px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu button:hover,
    .menu button.active {
      background: rgba(255,255,255,0.18);
    }

    /* Main Content */
    .main {
      margin-left: 280px;
      width: calc(100% - 280px);
      padding: 34px;
    }

    .topbar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar-info h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .topbar-info p {
      color: var(--text-muted);
    }

    .editor-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      max-width: 1000px;
    }

    .section-badge {
      display: inline-block;
      background: #dbeafe;
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 15px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    textarea {
      min-height: 250px;
      resize: vertical;
      line-height: 1.6;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    /* Upload Area */
    .upload-box {
      border: 2px dashed #bfdbfe;
      border-radius: 20px;
      padding: 30px;
      background: #f8fbff;
      text-align: center;
      transition: 0.2s;
    }

    .upload-box:hover {
      border-color: var(--primary);
      background: #f0f7ff;
    }

    .upload-box i {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .preview {
      margin-top: 24px;
      display: none;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Actions */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 16px;
      padding: 16px 28px;
      font-weight: 800;
      font-family: inherit;
      font-size: 15px;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #fecaca;
    }

    /* Status Messages */
    .status {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }

    .status-success {
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    .status-error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    @media (max-width: 900px) {
      .app { display: block; }
      .sidebar { position: relative; width: 100%; height: auto; }
      .main { margin-left: 0; width: 100%; padding: 20px; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Sidebar Lateral -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">P</div>
        <div class="logo-text">
          <strong>Pronti</strong>
          <span>Editor do Manual</span>
        </div>
      </div>

      <div class="menu-title">Tópicos do Manual</div>
      <nav class="menu">
        <button class="active" data-section="inicio"><i class="fa-solid fa-house"></i> Início</button>
        <button data-section="login"><i class="fa-solid fa-lock"></i> Login</button>
        <button data-section="empresa"><i class="fa-solid fa-building"></i> Criar empresa</button>
        <button data-section="servicos"><i class="fa-solid fa-scissors"></i> Serviços</button>
        <button data-section="novo-servico"><i class="fa-solid fa-plus"></i> Novo serviço</button>
        <button data-section="profissionais"><i class="fa-solid fa-users"></i> Profissionais</button>
        <button data-section="agenda"><i class="fa-solid fa-calendar"></i> Agenda</button>
        <button data-section="promocoes"><i class="fa-solid fa-tag"></i> Promoções</button>
        <button data-section="clientes-retorno"><i class="fa-solid fa-heart"></i> Retorno</button>
        <button data-section="vitrine"><i class="fa-solid fa-globe"></i> Vitrine</button>
        <button data-section="pagamentos"><i class="fa-solid fa-credit-card"></i> Pagamentos</button>
      </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-info">
          <h1>Editor do Manual Global</h1>
          <p>As alterações feitas aqui serão visíveis para todos os clientes do Pronti.</p>
        </div>
        <a href="manual-pronti.html" target="_blank" class="btn btn-secondary">
          <i class="fa-solid fa-eye"></i> Ver como Cliente
        </a>
      </div>

      <section class="editor-card">
        <span class="section-badge" id="sectionName">Início</span>

        <div class="form-group">
          <label for="titulo">Título da Seção</label>
          <input type="text" id="titulo" placeholder="Ex: Como realizar seu primeiro agendamento" />
        </div>

        <div class="form-group">
          <label for="conteudo">Conteúdo Explicativo (Texto do Manual)</label>
          <textarea id="conteudo" placeholder="Descreva o passo a passo de forma clara para o seu cliente..."></textarea>
        </div>

        <div class="form-group">
          <label>Imagem ou Print de Instrução</label>
          <div class="upload-box">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Clique para selecionar uma imagem (PNG, JPG)</p>
            <input type="file" id="imagem" accept="image/*" style="display: none;" />
            <button class="btn btn-secondary" style="margin: 10px auto;" onclick="document.getElementById('imagem').click()">
              Selecionar Arquivo
            </button>
          </div>

          <div class="preview" id="previewBox">
            <p style="margin-bottom: 10px; font-weight: 700; color: var(--text-muted);">Prévia da Imagem:</p>
            <img id="previewImg" alt="Prévia" />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btnSalvar">
            <i class="fa-solid fa-floppy-disk"></i> Salvar no Firebase
          </button>
          <button class="btn btn-secondary" id="btnLimparImagem">
            <i class="fa-solid fa-trash-can"></i> Remover Imagem
          </button>
          <button class="btn btn-danger" id="btnLimparSecao">
            <i class="fa-solid fa-eraser"></i> Resetar Seção
          </button>
        </div>

        <div id="statusMsg" class="status"></div>
      </section>
    </main>
  </div>

  <!-- Lógica Firebase -->
  <script type="module">
    import { auth, db, storage } from "../firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-storage.js";

    const ADMIN_UID = "BX6Q7HrVMrcCBqe72r7K76EBPkX2";
    const COLECAO_MANUAL = "manual_global";

    const secoes = {
      inicio: "Início", login: "Login", empresa: "Criar empresa", servicos: "Serviços",
      "novo-servico": "Novo serviço", profissionais: "Profissionais", agenda: "Agenda",
      promocoes: "Promoções", "clientes-retorno": "Clientes para retorno",
      vitrine: "Vitrine do cliente", pagamentos: "Pagamentos"
    };

    let secaoAtual = "inicio";
    let imagemUrlExistente = "";
    let arquivoParaUpload = null;

    const tituloInput = document.getElementById("titulo");
    const conteudoInput = document.getElementById("conteudo");
    const imagemInput = document.getElementById("imagem");
    const previewBox = document.getElementById("previewBox");
    const previewImg = document.getElementById("previewImg");
    const sectionName = document.getElementById("sectionName");
    const statusMsg = document.getElementById("statusMsg");
    const btnSalvar = document.getElementById("btnSalvar");

    // 1. Validação de Acesso
    onAuthStateChanged(auth, (user) => {
      if (user && user.uid === ADMIN_UID) {
        document.body.style.display = "block";
        carregarDados(secaoAtual);
      } else {
        window.location.href = "../index.html";
      }
    });

    // 2. Navegação do Menu
    document.querySelectorAll(".menu button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        secaoAtual = btn.dataset.section;
        carregarDados(secaoAtual);
      });
    });

    // 3. Seleção de Imagem
    imagemInput.addEventListener("change", (e) => {
      arquivoParaUpload = e.target.files[0];
      if (arquivoParaUpload) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          previewImg.src = ev.target.result;
          previewBox.style.display = "block";
        };
        reader.readAsDataURL(arquivoParaUpload);
      }
    });

    // 4. Carregar Dados do Firebase
    async function carregarDados(secao) {
      sectionName.textContent = secoes[secao];
      statusMsg.style.display = "none";
      arquivoParaUpload = null;
      imagemInput.value = "";

      try {
        const docRef = doc(db, COLECAO_MANUAL, secao);
        const snap = await getDoc(docRef);

        if (snap.exists()) {
          const d = snap.data();
          tituloInput.value = d.titulo || "";
          conteudoInput.value = d.conteudo || "";
          imagemUrlExistente = d.imagem || "";
        } else {
          tituloInput.value = "";
          conteudoInput.value = "";
          imagemUrlExistente = "";
        }

        if (imagemUrlExistente) {
          previewImg.src = imagemUrlExistente;
          previewBox.style.display = "block";
        } else {
          previewBox.style.display = "none";
        }
      } catch (err) {
        console.error(err);
      }
    }

    // 5. Salvar (Storage + Firestore)
    async function salvar() {
      if (!tituloInput.value.trim()) {
        mostrarStatus("Por favor, insira um título.", "error");
        return;
      }

      btnSalvar.disabled = true;
      btnSalvar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando no Firebase...';

      try {
        let urlFinal = imagemUrlExistente;

        // Se selecionou nova foto, faz upload pro Storage
        if (arquivoParaUpload) {
          const storageRef = ref(storage, `manual_global/${secaoAtual}_${Date.now()}`);
          const uploadTask = await uploadBytes(storageRef, arquivoParaUpload);
          urlFinal = await getDownloadURL(uploadTask.ref);
        }

        // Salva no Firestore
        await setDoc(doc(db, COLECAO_MANUAL, secaoAtual), {
          id: secaoAtual,
          nome: secoes[secaoAtual],
          titulo: tituloInput.value.trim(),
          conteudo: conteudoInput.value.trim(),
          imagem: urlFinal,
          dataAtualizacao: new Date()
        });

        imagemUrlExistente = urlFinal;
        arquivoParaUpload = null;
        mostrarStatus("Seção salva com sucesso no Firebase!", "success");
      } catch (err) {
        console.error(err);
        mostrarStatus("Erro ao salvar: " + err.message, "error");
      } finally {
        btnSalvar.disabled = false;
        btnSalvar.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar no Firebase';
      }
    }

    function mostrarStatus(msg, tipo) {
      statusMsg.textContent = msg;
      statusMsg.className = `status status-${tipo}`;
      statusMsg.style.display = "block";
      if (tipo === "success") setTimeout(() => statusMsg.style.display = "none", 4000);
    }

    // 6. Limpar
    document.getElementById("btnLimparImagem").onclick = () => {
      imagemUrlExistente = "";
      arquivoParaUpload = null;
      imagemInput.value = "";
      previewBox.style.display = "none";
    };

    document.getElementById("btnLimparSecao").onclick = async () => {
      if (confirm("Deseja apagar esta seção do Firebase permanentemente?")) {
        await deleteDoc(doc(db, COLECAO_MANUAL, secaoAtual));
        carregarDados(secaoAtual);
        mostrarStatus("Seção resetada.", "success");
      }
    };

    document.getElementById("btnSalvar").onclick = salvar;

  </script>
</body>
</html>
