<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Administração de Clientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial, sans-serif; background: #f6f6fa; margin: 0; } 
        .main { margin-left: 260px; padding: 32px; } 
        @media (max-width: 900px ) { .main { margin-left: 0; } } 

        .empresa { border: 1px solid #eee; margin-bottom: 32px; border-radius: 8px; padding: 16px; background: #fafbfc; } 
        .empresa-header { display: flex; align-items: center; justify-content: space-between; } 

        .btn-block { background: #dc2626; color: #fff; border: none; border-radius: 4px; padding: 6px 18px; cursor: pointer; } 
        .btn-unblock { background: #10b981; color: #fff; border: none; border-radius: 4px; padding: 6px 18px; cursor: pointer; } 

        .loading, .restricted { padding: 32px; text-align: center; font-size: 1.1em; } 

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #4f46e5 0%, #6366f1 100%);
            min-height: 100vh;
            color: #fff;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            padding-top: 24px;
        }

        .page-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom: 20px;
        }

        .btn-pendentes {
            background:#2563eb;
            color:#fff;
            padding:10px 16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .btn-planos {
            background:#f59e0b;
            color:#fff;
            padding:10px 16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        table { width:100%; border-collapse: collapse; }
        th, td { padding:8px; border-bottom:1px solid #eee; }
    </style>
</head>

<body>

<aside class="sidebar"></aside>

<div class="main">
    <div id="conteudo-admin"></div>
</div>

<script type="module">

import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import {
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const ADMIN_UID = "BX6Q7HrVMrcCBqe72r7K76EBPkX2";
const conteudoDiv = document.getElementById("conteudo-admin");

let empresasCache = [];
let planosCache = [];
let tela = "empresas";

// ================= RENDER BASE =================
function render(html) {
    conteudoDiv.innerHTML = html;
}

// ================= MENU =================
function menu() {
    return `
        <div class="page-header">
            <h2>${tela === "empresas" ? "Empresas" : "Planos Pronti"}</h2>

            <div>
                <button class="btn-planos" id="btnEmp">Empresas</button>
                <button class="btn-pendentes" id="btnPlanos">Planos</button>
            </div>
        </div>
    `;
}

// ================= EMPRESAS =================
async function carregarEmpresas() {
    const snap = await getDocs(collection(db, "empresarios"));

    empresasCache = await Promise.all(snap.docs.map(async d => {
        const empresa = { uid: d.id, ...d.data() };

        const profSnap = await getDocs(
            collection(db, "empresarios", empresa.uid, "profissionais")
        );

        empresa.funcionarios = profSnap.docs.map(p => p.data());
        return empresa;
    }));

    renderEmpresas();
}

function renderEmpresas() {
    tela = "empresas";

    let html = menu();

    html += `<h3>Gestão de Empresas</h3>`;

    html += empresasCache.map(e => `
        <div class="empresa">
            <strong>${e.nome || e.email}</strong><br>
            Funcionários: ${e.funcionarios?.length || 0}<br>

            Licenças:
            <input id="license-${e.uid}" value="${e.usuariosLicenciados || 0}">
            <button onclick="salvarLicencas('${e.uid}')">Salvar</button>
        </div>
    `).join("");

    render(html);

    document.getElementById("btnEmp").onclick = renderEmpresas;
    document.getElementById("btnPlanos").onclick = carregarPlanos;
}

// ================= PLANOS =================
async function carregarPlanos() {
    tela = "planos";

    const snap = await getDocs(collection(db, "planosPronti"));

    planosCache = snap.docs.map(d => ({
        id: d.id,
        ...d.data()
    }));

    let html = menu();

    html += `<h3>Planos Pronti</h3>`;

    if (planosCache.length === 0) {
        html += `<p>Nenhum plano encontrado</p>`;
    } else {
        html += `
        <table>
            <tr>
                <th>Nome</th>
                <th>Funcionários</th>
                <th>Preço</th>
                <th>Link MP</th>
            </tr>
        `;

        html += planosCache.map(p => `
            <tr>
                <td>${p.nome}</td>
                <td>${p.limiteFuncionarios}</td>
                <td>R$ ${p.preco}</td>
                <td><a href="${p.linkMP}" target="_blank">Abrir</a></td>
            </tr>
        `).join("");

        html += `</table>`;
    }

    render(html);

    document.getElementById("btnEmp").onclick = renderEmpresas;
    document.getElementById("btnPlanos").onclick = carregarPlanos;
}

// ================= SALVAR LICENÇA =================
async function salvarLicencas(id) {
    const input = document.getElementById(`license-${id}`);

    await updateDoc(doc(db, "empresarios", id), {
        usuariosLicenciados: parseInt(input.value)
    });

    alert("Salvo!");
}

// ================= LOGIN =================
onAuthStateChanged(auth, async user => {
    if (user && user.uid === ADMIN_UID) {
        carregarEmpresas();
    } else {
        render("Acesso negado");
    }
});

// ================= GLOBAL =================
window.salvarLicencas = salvarLicencas;

</script>

</body>
</html>
